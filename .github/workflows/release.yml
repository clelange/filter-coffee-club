name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: CalVer tag in the form vYYYY.MM.N (for example, v2026.07.0)
        required: true
        type: string
      upgrade_notes:
        description: Manual upgrade or database notes to prepend to the generated changelog
        required: true
        default: Back up the SQLite database before upgrading. No additional manual steps are expected.
        type: string

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  prepare:
    name: Validate release
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true
      - name: Validate CalVer tag
        id: version
        env:
          RELEASE_TAG: ${{ inputs.version }}
        shell: bash
        run: |
          if [[ "$GITHUB_REF" != "refs/heads/main" ]]; then
            echo "::error::Releases must be run from the main branch."
            exit 1
          fi

          if [[ ! "$RELEASE_TAG" =~ ^v[0-9]{4}\.(0[1-9]|1[0-2])\.[0-9]+$ ]]; then
            echo "::error::Version must use vYYYY.MM.N, for example v2026.07.0."
            exit 1
          fi

          if git ls-remote --exit-code --tags origin "refs/tags/$RELEASE_TAG" >/dev/null 2>&1; then
            echo "::error::Tag $RELEASE_TAG already exists."
            exit 1
          fi

          printf 'tag=%s\n' "$RELEASE_TAG" >> "$GITHUB_OUTPUT"

  checks:
    name: Run CI
    needs: prepare
    uses: ./.github/workflows/ci.yml
    permissions:
      contents: read

  publish:
    name: Publish container
    needs:
      - prepare
      - checks
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    env:
      IMAGE: ghcr.io/${{ github.repository }}
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=${{ needs.prepare.outputs.tag }}
            type=sha,format=short,prefix=sha-
            type=raw,value=latest
      - name: Build and push multi-platform image
        id: push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true
      - name: Attest image provenance
        uses: actions/attest@v4
        with:
          subject-name: ${{ env.IMAGE }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

  github-release:
    name: Create GitHub release
    needs:
      - prepare
      - publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Create release and generated notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.prepare.outputs.tag }}
          UPGRADE_NOTES: ${{ inputs.upgrade_notes }}
        shell: bash
        run: |
          gh release create "$RELEASE_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "$RELEASE_TAG" \
            --generate-notes \
            --fail-on-no-commits \
            --latest \
            --notes "## Upgrade notes

          ${UPGRADE_NOTES}

          ## Container image

          ghcr.io/${GITHUB_REPOSITORY}:${RELEASE_TAG}"
