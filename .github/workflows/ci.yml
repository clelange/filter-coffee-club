name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - run: uv sync --frozen
      - run: pnpm --dir frontend install --frozen-lockfile
      - run: uv run ruff check backend tests scripts migrations
      - run: uv run ruff format --check backend tests scripts migrations
      - run: uv run pytest --cov=app --cov-report=term-missing
      - run: pnpm --dir frontend exec svelte-check --tsconfig ./tsconfig.json
      - run: uv run python scripts/export_openapi.py openapi.json
      - run: pnpm --dir frontend exec openapi-typescript ../openapi.json -o src/lib/generated-api.d.ts
      - run: git diff --exit-code -- frontend/src/lib/generated-api.d.ts
      - run: pnpm --dir frontend build
      - run: uv run python scripts/check_bundle.py
      - run: pnpm --dir frontend exec playwright install --with-deps chromium
      - run: pnpm --dir frontend exec playwright test
      - run: docker build -t filter-coffee-club:test .
