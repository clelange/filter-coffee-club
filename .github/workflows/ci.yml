name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - edited
  workflow_call:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - run: uv sync --frozen
      - name: Validate conventional PR title
        if: github.event_name == 'pull_request'
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          printf '%s\n' "$PR_TITLE" > "$RUNNER_TEMP/pr-title"
          uv run conventional-pre-commit --strict "$RUNNER_TEMP/pr-title"
      - run: pnpm --dir frontend install --frozen-lockfile
      - run: uv run prek run --all-files
      - run: uv run pytest --cov=app --cov-report=term-missing
      - run: make types-check
      - run: pnpm --dir frontend exec playwright install --with-deps chromium
      - run: make e2e
      - run: docker build -t filter-coffee-club:test .
